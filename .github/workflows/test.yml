name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            reth
            test

      - name: install deps
        run: sudo apt-get install -y --no-install-recommends libgmp10 lld

      - name: download ziskemu
        run: |
          mkdir -p "$HOME/.zisk"
          curl -fsSL https://github.com/0xPolygonHermez/zisk/releases/download/v0.18.0/cargo_zisk_linux_amd64.tar.gz \
            | tar -xz -C "$HOME/.zisk" ./bin/ziskemu
          echo "$HOME/.zisk/bin" >> "$GITHUB_PATH"

      - name: make
        run: make

      - name: build reth-test cli
        run: cargo build --release --manifest-path reth-test/Cargo.toml

      - name: cache fixtures tarball
        uses: actions/cache@v4
        with:
          path: fixtures.tar.zst
          key: fixtures-${{ hashFiles('download-fixtures.sh') }}

      - name: download fixtures
        run: ./download-fixtures.sh

      - name: run reth-test
        env:
          RAYON_NUM_THREADS: 1
          RUST_BACKTRACE: 1
        run: ./reth-test/target/release/reth-test --elf-path ./reth-zisk.elf --input-dir ./fixtures
